# Render Blueprint – wenn das ganze "ts"-Projekt das Git-Repo ist.

services:
  - type: web
    name: ts-multiplayer-radar
    runtime: python
    rootDir: radar
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 --bind 0.0.0.0:$PORT --timeout 120 server:application
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RENDER
        value: "true"
