# Render Blueprint – Web Service für TS Multiplayer-Radar
# Repo: nur den Ordner "radar" als GitHub-Root hochladen ODER rootDir anpassen.

services:
  - type: web
    name: ts-multiplayer-radar
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn_config.py server:application
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RENDER
        value: "true"
